<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner &amp; Settings Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        @keyframes scan {
            0%, 100% { top: 0%; opacity: 0; }
            10%, 90% { opacity: 1; }
            50% { top: 98%; opacity: 1; }
        }
        .animate-scan {
            animation: scan 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .cutout-shadow {
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.85);
        }
    </style>
</head>
<body class="bg-black text-white h-screen w-screen overflow-hidden relative font-sans selection:bg-white/20 antialiased font-[Inter]">

    <!-- Simulated Camera Feed Background -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <img src="https://images.unsplash.com/photo-1572949645841-094f3a9c4c94?q=80&amp;w=2574&amp;auto=format&amp;fit=crop" class="w-full h-full object-cover opacity-50 blur-[2px] scale-105" alt="Museum background">
    </div>

    <!-- Top Navigation Area -->
    <div class="absolute top-0 inset-x-0 z-30 flex justify-between items-start p-5 sm:p-8 bg-gradient-to-b from-black/80 via-black/40 to-transparent pointer-events-none">
        <div class="pointer-events-auto">
            <button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-white/80 hover:text-white hover:bg-white/10 transition-all">
                <iconify-icon icon="solar:close-circle-linear" width="22" height="22" style="stroke-width: 1.5;"></iconify-icon>
            </button>
        </div>
        
        <div class="flex flex-col items-center mt-2">
            <div class="text-sm font-semibold tracking-tighter text-white mb-1">MUSE</div>
            <div class="px-2.5 py-1 rounded-full bg-white/10 backdrop-blur-sm border border-white/5 flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 rounded-full bg-gray-500"></div>
                <span class="text-xs font-medium text-white/70 uppercase tracking-widest">Paused</span>
            </div>
        </div>

        <div class="pointer-events-auto">
            <button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-white/80 hover:text-white hover:bg-white/10 transition-all">
                <iconify-icon icon="solar:flashlight-linear" width="22" height="22" style="stroke-width: 1.5;"></iconify-icon>
            </button>
        </div>
    </div>

    <!-- Scanner Reticle Overlay (Background) -->
    <div class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none pb-32">
        <div class="relative w-64 h-64 sm:w-72 sm:h-72 rounded-3xl cutout-shadow opacity-50">
            <div class="absolute top-0 left-0 w-12 h-12 border-t-[3px] border-l-[3px] border-white/90 rounded-tl-3xl"></div>
            <div class="absolute top-0 right-0 w-12 h-12 border-t-[3px] border-r-[3px] border-white/90 rounded-tr-3xl"></div>
            <div class="absolute bottom-0 left-0 w-12 h-12 border-b-[3px] border-l-[3px] border-white/90 rounded-bl-3xl"></div>
            <div class="absolute bottom-0 right-0 w-12 h-12 border-b-[3px] border-r-[3px] border-white/90 rounded-br-3xl"></div>
        </div>
    </div>

    <!-- Settings Panel Modal Overlay -->
    <div class="absolute inset-0 z-40 flex items-center justify-center p-4 sm:p-6 bg-black/60 backdrop-blur-sm pointer-events-auto">
        <div class="w-full max-w-sm bg-[#0a0a0a]/95 backdrop-blur-2xl border border-white/10 rounded-[28px] shadow-2xl overflow-hidden transform transition-all">
            
            <!-- Header -->
            <div class="px-5 py-4 border-b border-white/5 flex justify-between items-center">
                <h2 class="text-xl font-semibold tracking-tight text-white/95">Settings</h2>
                <button class="w-8 h-8 rounded-full bg-white/5 border border-white/5 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition-all">
                    <iconify-icon icon="solar:close-circle-linear" width="20" height="20" style="stroke-width: 1.5;"></iconify-icon>
                </button>
            </div>
            
            <!-- Settings Options -->
            <div class="p-2 sm:p-3 flex flex-col gap-1">
                
                <!-- Voice Narration Toggle -->
                <div class="flex items-center justify-between p-3 rounded-2xl hover:bg-white/5 transition-colors group">
                    <div class="flex items-center gap-3.5">
                        <div class="w-10 h-10 rounded-full bg-white/5 border border-white/5 flex items-center justify-center text-white/70 group-hover:text-white transition-colors">
                            <iconify-icon icon="solar:volume-loud-linear" width="20" height="20" style="stroke-width: 1.5;"></iconify-icon>
                        </div>
                        <div>
                            <div class="text-sm font-medium text-white/90">Voice Narration</div>
                            <div class="text-xs text-white/50 mt-0.5">Auto-play audio guides</div>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer shrink-0">
                        <input type="checkbox" class="sr-only peer" checked="">
                        <div class="w-11 h-6 bg-white/10 rounded-full peer-checked:bg-white transition-colors duration-300 border border-transparent peer-checked:border-white"></div>
                        <div class="absolute left-0.5 top-0.5 bg-white peer-checked:bg-[#0a0a0a] w-5 h-5 rounded-full transition-transform duration-300 peer-checked:translate-x-5 shadow-sm"></div>
                    </label>
                </div>

                <!-- Cursor Mode Toggle -->
                <div class="flex items-center justify-between p-3 rounded-2xl hover:bg-white/5 transition-colors group">
                    <div class="flex items-center gap-3.5">
                        <div class="w-10 h-10 rounded-full bg-white/5 border border-white/5 flex items-center justify-center text-white/70 group-hover:text-white transition-colors">
                            <iconify-icon icon="solar:cursor-square-linear" width="20" height="20" style="stroke-width: 1.5;"></iconify-icon>
                        </div>
                        <div>
                            <div class="text-sm font-medium text-white/90">Cursor Mode</div>
                            <div class="text-xs text-white/50 mt-0.5">Enable precise selection</div>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer shrink-0">
                        <input type="checkbox" class="sr-only peer">
                        <div class="w-11 h-6 bg-white/10 rounded-full peer-checked:bg-white transition-colors duration-300 border border-transparent peer-checked:border-white"></div>
                        <div class="absolute left-0.5 top-0.5 bg-white/70 peer-checked:bg-[#0a0a0a] w-5 h-5 rounded-full transition-transform duration-300 peer-checked:translate-x-5 shadow-sm"></div>
                    </label>
                </div>

                <!-- Theme Toggle -->
                <div class="flex items-center justify-between p-3 rounded-2xl hover:bg-white/5 transition-colors group">
                    <div class="flex items-center gap-3.5">
                        <div class="w-10 h-10 rounded-full bg-white/5 border border-white/5 flex items-center justify-center text-white/70 group-hover:text-white transition-colors">
                            <iconify-icon icon="solar:moon-linear" width="20" height="20" style="stroke-width: 1.5;"></iconify-icon>
                        </div>
                        <div>
                            <div class="text-sm font-medium text-white/90">Dark Theme</div>
                            <div class="text-xs text-white/50 mt-0.5">Use light/dark appearance</div>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer shrink-0">
                        <input type="checkbox" class="sr-only peer" checked="">
                        <div class="w-11 h-6 bg-white/10 rounded-full peer-checked:bg-white transition-colors duration-300 border border-transparent peer-checked:border-white"></div>
                        <div class="absolute left-0.5 top-0.5 bg-white peer-checked:bg-[#0a0a0a] w-5 h-5 rounded-full transition-transform duration-300 peer-checked:translate-x-5 shadow-sm"></div>
                    </label>
                </div>

            </div>
        </div>
    </div>


</body></html>
